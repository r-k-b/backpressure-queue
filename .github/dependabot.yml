version: 2
updates:
- package-ecosystem: npm
  cooldown:
    default-days: 10
  directory: "/"
  schedule:
    interval: weekly
    day: "friday"
- package-ecosystem: "github-actions"
  cooldown:
    default-days: 10
  directory: "/"
  schedule:
    interval: "daily"
    timezone: Australia/Sydney
- package-ecosystem: "nix"
  cooldown:
    default-days: 10
  directory: "/"
  schedule:
    interval: "weekly"
    timezone: Australia/Sydney
